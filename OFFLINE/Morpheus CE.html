<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Morpheus - Online Code Editor</title>

  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="style1.css>
  <link rel="stylesheet" href="style2.css">
  <link rel="stylesheet" href="style3.css">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 16px;
      margin: 0;
      margin-right: 16px;
      font-weight: 600;
      color: #333;
    }

    button {
      border: 1px solid #ccc;
      background: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #f0f0f0;
    }

    input[type="file"] {
      font-size: 13px;
    }

    #filename {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 13px;
      width: 180px;
    }

    #editor-container {
      height: calc(100vh - 48px);
    }

    .CodeMirror {
      height: 100%;
      font-size: 13px;
    }

    .toolbar-spacer {
      flex: 1;
    }

    small {
      color: #777;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Morpheus Code</h1>

    <label>
      <input type="file" id="fileInput" accept=".html,.htm,.css,.txt" style="max-width: 200px;">
    </label>

    <input type="text" id="filename" placeholder="filename.html" />

    <button id="downloadBtn">Download</button>

    <div class="toolbar-spacer"></div>

    <small>Autocomplete: Ctrl+Space</small>
  </header>

  <div id="editor-container">
    <textarea id="code">
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Demo</title>
    <style>
      body {
        font-family: sans-serif;
        background: #fafafa;
        color: #333;
      }
      h1 {
        color: #007acc;
      }
    </style>
  </head>
  <body>
    <h1>Hello, world!</h1>
    <p>Edit this HTML/CSS in the editor.</p>
  </body>
</html>
    </textarea>
  </div>

  <!-- CodeMirror JS -->
  <script src="script1.js"></script>
  <script src="script2.js"></script>
  <script src="script3.js"></script>
  <script src="script4.js"></script>
  <script src="script5.js"></script>

  <!-- Hints / autocomplete -->
  <script src="script6.js"></script>
  <script src="script7.js"></script>
  <script src="script8.js"></script>
  <script src="script9.js"></script>

  <script>
    // Initialize CodeMirror
    var editor = CodeMirror.fromTextArea(document.getElementById("code"), {
      mode: "text/html",
      theme: "eclipse",
      lineNumbers: true,
      lineWrapping: true,
      tabSize: 2,
      indentUnit: 2,
      indentWithTabs: false,
      extraKeys: {
        "Ctrl-Space": "autocomplete",
        "Ctrl-S": function(cm) {
          triggerDownload();
        }
      }
    });

    // Handle file upload
    document.getElementById("fileInput").addEventListener("change", function (e) {
      var file = e.target.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function (evt) {
        editor.setValue(evt.target.result);
      };
      reader.readAsText(file);

      document.getElementById("filename").value = file.name || "untitled.html";
    });

    // Download logic
    function triggerDownload() {
      var content = editor.getValue();
      var filename = document.getElementById("filename").value.trim() || "untitled.html";

      var blob = new Blob([content], { type: "text/plain;charset=utf-8" });
      var url = URL.createObjectURL(blob);

      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    document.getElementById("downloadBtn").addEventListener("click", triggerDownload);
  </script>
</body>
</html>
